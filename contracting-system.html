<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة المقاولات</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #252840;
    --border: #2e3255;
    --accent: #4f7cff;
    --accent2: #7c4fff;
    --gold: #f5c842;
    --green: #2ecc71;
    --red: #e74c3c;
    --orange: #f39c12;
    --text: #e8eaf6;
    --text2: #9ba3d4;
    --text3: #5c6494;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --font: 'Segoe UI', Tahoma, Arial, sans-serif;
  }
  [data-theme="light"] {
    --bg: #f0f2ff;
    --surface: #ffffff;
    --surface2: #eef0ff;
    --border: #d0d5f5;
    --text: #1a1d2e;
    --text2: #4a4f7a;
    --text3: #8a8fb0;
    --shadow: 0 4px 24px rgba(79,124,255,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; transition: background 0.3s, color 0.3s; }
  
  /* Layout */
  #app { display: flex; min-height: 100vh; }
  #sidebar { width: 240px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; right: 0; left: auto; bottom: 0; z-index: 100; transition: transform 0.3s; }
  #main { flex: 1; margin-right: 240px; display: flex; flex-direction: column; min-height: 100vh; }
  #topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  #content { flex: 1; padding: 24px; }

  /* Sidebar */
  .sidebar-logo { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-logo h1 { font-size: 15px; font-weight: 700; color: var(--accent); }
  .sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
  .nav-section { padding: 8px 12px 4px; font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; color: var(--text2); transition: all 0.15s; font-size: 13px; border-radius: 0; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: linear-gradient(90deg, rgba(79,124,255,0.2) 0%, transparent 100%); color: var(--accent); border-right: 3px solid var(--accent); }
  .nav-item .icon { width: 20px; text-align: center; font-size: 16px; flex-shrink: 0; }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
  .user-badge { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--surface2); border-radius: var(--radius); }
  .user-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 12px; font-weight: 600; }
  .user-role { font-size: 10px; color: var(--text3); }

  /* Topbar */
  .page-title { font-size: 16px; font-weight: 700; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: var(--font); white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a6bf0; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon { padding: 7px; width: 34px; height: 34px; justify-content: center; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 700; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-value { font-size: 24px; font-weight: 800; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 700; padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:hover td { background: var(--surface2); }
  tr:last-child td { border-bottom: none; }

  /* Forms */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  input, select, textarea { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 13px; transition: border-color 0.15s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); transform: translateY(20px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 0 24px 20px; display: flex; gap: 10px; justify-content: flex-start; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-green { background: rgba(46,204,113,0.15); color: var(--green); }
  .badge-red { background: rgba(231,76,60,0.15); color: var(--red); }
  .badge-orange { background: rgba(243,156,18,0.15); color: var(--orange); }
  .badge-blue { background: rgba(79,124,255,0.15); color: var(--accent); }
  .badge-purple { background: rgba(124,79,255,0.15); color: var(--accent2); }

  /* Search */
  .search-bar { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; height: 36px; flex: 1; max-width: 320px; }
  .search-bar input { background: transparent; border: none; padding: 0; flex: 1; }
  .search-bar input:focus { border: none; }

  /* Progress */
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s; }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text3); border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text2); }

  /* Utility */
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .mb-24 { margin-bottom: 24px; }
  .text-muted { color: var(--text3); }
  .text-sm { font-size: 12px; }
  .text-lg { font-size: 18px; }
  .font-bold { font-weight: 700; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-gold { color: var(--gold); }
  .text-accent { color: var(--accent); }
  .text-center { text-align: center; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Hamburger */
  #menu-toggle { display: none; }
  .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

  /* Mobile */
  @media (max-width: 768px) {
    #sidebar { 
      right: 0; 
      left: auto; 
      transform: translate3d(100%, 0, 0);
    }
    #sidebar.open { 
      transform: translate3d(0, 0, 0); 
    }
    /* iOS Safari RTL fix */
    html[dir="rtl"] #sidebar {
      right: 0;
      left: auto;
      transform: translate3d(100%, 0, 0);
    }
    html[dir="rtl"] #sidebar.open {
      transform: translate3d(0, 0, 0);
    }
    #main { margin-right: 0; }
    #menu-toggle { display: flex; }
    .overlay-bg.show { display: block; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    #content { padding: 16px; }
    .topbar-search { display: none; }
  }
  @media (max-width: 480px) {
    .stat-card { padding: 16px; }
    .stat-value { font-size: 20px; }
  }

  /* Login */
  #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 380px; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo h1 { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-logo p { color: var(--text3); font-size: 13px; margin-top: 6px; }

  /* Print */
  @media print {
    #sidebar, #topbar, .no-print { display: none !important; }
    #main { margin-right: 0; }
    body { background: #fff; color: #000; }
    .card, .stat-card { border: 1px solid #ddd; background: #fff; }
  }

  /* Receipt print */
  .receipt { background: #fff; color: #000; padding: 32px; max-width: 400px; margin: 0 auto; }
  .receipt-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 16px; margin-bottom: 16px; }
  .receipt-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #ccc; }
  .receipt-total { font-size: 18px; font-weight: 800; text-align: center; padding: 12px; border: 2px solid #000; margin-top: 12px; }

  /* Notification */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; box-shadow: var(--shadow); }
  #toast.show { opacity: 1; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>🏗️ نظام المقاولات</h1>
      <p>إدارة العقود والمشاريع والمالية</p>
    </div>
    <div class="form-group">
      <label>اسم المستخدم</label>
      <input type="text" id="login-user" placeholder="أدخل اسم المستخدم" value="admin">
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="login-pass" placeholder="أدخل كلمة المرور" value="1234">
    </div>
    <div class="form-group">
      <label>الصلاحية</label>
      <select id="login-role">
        <option value="admin">مدير عام</option>
        <option value="accounts">حسابات</option>
        <option value="hr">موارد بشرية</option>
        <option value="management">إدارة</option>
      </select>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="doLogin()">تسجيل الدخول</button>
    <p style="text-align:center;margin-top:12px;font-size:11px;color:var(--text3)">كلمة المرور الافتراضية: 1234</p>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- App -->
<div id="app">
  <div class="overlay-bg" id="overlay-bg" onclick="closeSidebar()"></div>
  
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>🏗️ نظام المقاولات</h1>
      <p id="current-date-sidebar"></p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">م</div>
        <div class="user-info">
          <div class="user-name" id="user-display-name">المدير العام</div>
          <div class="user-role" id="user-display-role">صلاحية كاملة</div>
        </div>
        <button class="btn btn-ghost btn-icon btn-sm" onclick="doLogout()" title="خروج">🚪</button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div class="flex-center gap-12">
        <button class="btn btn-ghost btn-icon" id="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span class="page-title" id="page-title">لوحة التحكم</span>
      </div>
      <div class="topbar-actions">
        <div class="search-bar topbar-search">
          <span>🔍</span>
          <input type="text" id="global-search" placeholder="بحث شامل..." oninput="globalSearch(this.value)">
        </div>
        <button class="btn btn-ghost btn-icon" onclick="toggleTheme()" id="theme-btn" title="تبديل المظهر">🌙</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
// ============ STATE ============
let currentUser = null;
let currentPage = 'dashboard';
let DB = {};

const ROLES = {
  admin:      { label: 'مدير عام',      pages: ['dashboard','complexes','contractors','employees','receipts','payments','reports','settings'] },
  accounts:   { label: 'حسابات',        pages: ['dashboard','receipts','payments','reports'] },
  hr:         { label: 'موارد بشرية',   pages: ['employees'] },
  management: { label: 'إدارة',         pages: ['dashboard','complexes','contractors','reports'] }
};

const PAGES = [
  { id:'dashboard',   icon:'📊', label:'لوحة التحكم',       section:'رئيسي' },
  { id:'complexes',   icon:'🏙️', label:'المجمعات',           section:'العمليات' },
  { id:'contractors', icon:'👷', label:'المقاولون',           section:'العمليات' },
  { id:'employees',   icon:'👥', label:'الموظفون',           section:'العمليات' },
  { id:'receipts',    icon:'📥', label:'سندات القبض',        section:'المالية' },
  { id:'payments',    icon:'📤', label:'سندات الصرف',        section:'المالية' },
  { id:'reports',     icon:'📑', label:'التقارير',           section:'المالية' },
  { id:'settings',    icon:'⚙️', label:'الإعدادات',         section:'النظام' },
];

// ============ DB ============
function loadDB() {
  const saved = localStorage.getItem('contracting_db');
  if (saved) { DB = JSON.parse(saved); }
  else {
    DB = { complexes:[], contractors:[], employees:[], attendance:[], salaries:[], receipts:[], payments:[], receipt_seq:1, payment_seq:1 };
    seedData();
    saveDB();
  }
}
function saveDB() { localStorage.setItem('contracting_db', JSON.stringify(DB)); }
function seedData() {
  DB.complexes = [
    { id:1, name:'مجمع النخيل', company:'شركة الإنشاء الحديث', contract_no:'C-2024-001', contract_date:'2024-01-15', units:120, unit_price:8500000, contract_value:1020000000, start_date:'2024-02-01', expected_end:'2025-06-30', status:'جاري', created_at: now() },
    { id:2, name:'مجمع الرياض', company:'شركة البناء الذهبي', contract_no:'C-2024-002', contract_date:'2024-03-10', units:80, unit_price:9200000, contract_value:736000000, start_date:'2024-04-01', expected_end:'2025-10-31', status:'جاري', created_at: now() },
  ];
  DB.contractors = [
    { id:1, name:'أبو محمد البناء', phone:'07701234567', address:'بغداد - الكرادة', type:'meter', price_per_meter:45000, agreed_qty:5000, done_qty:3200, created_at: now() },
    { id:2, name:'مقاولات العراق', phone:'07809876543', address:'بغداد - المنصور', type:'fixed', houses:40, house_price:3500000, created_at: now() },
  ];
  DB.employees = [
    { id:1, name:'أحمد كريم محمد', phone:'07751112233', address:'بغداد', job:'مهندس موقع', location:'مجمع النخيل', start_date:'2024-02-01', salary:750000, status:'فعال', created_at: now() },
    { id:2, name:'سعد علي حسين', phone:'07754443322', address:'بغداد - الكرخ', job:'محاسب', location:'المكتب الرئيسي', start_date:'2024-01-01', salary:600000, status:'فعال', created_at: now() },
  ];
  DB.receipts = [
    { id:1, no:'QBD-0001', date:'2024-05-01', complex_id:1, from:'شركة الإنشاء الحديث', amount:150000000, method:'حوالة', notes:'دفعة أولى', created_at: now() },
    { id:2, no:'QBD-0002', date:'2024-06-15', complex_id:2, from:'شركة البناء الذهبي', amount:80000000, method:'شيك', notes:'دفعة أولى', created_at: now() },
  ];
  DB.payments = [
    { id:1, no:'SRF-0001', date:'2024-05-10', beneficiary:'أبو محمد البناء', type:'مقاول', complex_id:1, amount:50000000, method:'نقدي', notes:'دفعة أعمال', created_at: now() },
    { id:2, no:'SRF-0002', date:'2024-05-25', beneficiary:'أحمد كريم محمد', type:'موظف', complex_id:1, amount:750000, method:'نقدي', notes:'راتب مايو', created_at: now() },
  ];
  DB.receipt_seq = 3;
  DB.payment_seq = 3;
}
function now() { return new Date().toISOString(); }
function nextReceiptNo() { const n = DB.receipt_seq++; saveDB(); return `QBD-${String(n).padStart(4,'0')}`; }
function nextPaymentNo() { const n = DB.payment_seq++; saveDB(); return `SRF-${String(n).padStart(4,'0')}`; }

// ============ AUTH ============
function doLogin() {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const role = document.getElementById('login-role').value;
  if (!user || pass !== '1234') { showToast('اسم مستخدم أو كلمة مرور خاطئة','error'); return; }
  currentUser = { name: user, role };
  document.getElementById('login-screen').style.display = 'none';
  initApp();
}
function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
}
function can(page) { return ROLES[currentUser?.role]?.pages.includes(page); }

// ============ APP INIT ============
function initApp() {
  buildNav();
  updateUserBadge();
  document.getElementById('current-date-sidebar').textContent = new Date().toLocaleDateString('ar-IQ', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  navigate('dashboard');
}
function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  let lastSection = '';
  PAGES.forEach(p => {
    if (!can(p.id)) return;
    if (p.section !== lastSection) {
      nav.innerHTML += `<div class="nav-section">${p.section}</div>`;
      lastSection = p.section;
    }
    nav.innerHTML += `<div class="nav-item" id="nav-${p.id}" onclick="navigate('${p.id}')"><span class="icon">${p.icon}</span>${p.label}</div>`;
  });
}
function updateUserBadge() {
  const r = ROLES[currentUser.role];
  document.getElementById('user-display-name').textContent = currentUser.name;
  document.getElementById('user-display-role').textContent = r.label;
  document.getElementById('user-avatar').textContent = currentUser.name[0];
}
function navigate(page) {
  if (!can(page)) { navigate('dashboard'); return; }
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById(`nav-${page}`);
  if (nav) nav.classList.add('active');
  const p = PAGES.find(x => x.id === page);
  document.getElementById('page-title').textContent = p?.label || '';
  renderPage(page);
  closeSidebar();
}
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ob = document.getElementById('overlay-bg');
  const isOpen = sb.classList.contains('open');
  if (isOpen) {
    sb.classList.remove('open');
    sb.style.transform = 'translate3d(100%, 0, 0)';
    ob.classList.remove('show');
  } else {
    sb.classList.add('open');
    sb.style.transform = 'translate3d(0, 0, 0)';
    ob.classList.add('show');
  }
}
function closeSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.remove('open');
  sb.style.transform = 'translate3d(100%, 0, 0)';
  document.getElementById('overlay-bg').classList.remove('show');
}

// ============ THEME ============
let darkMode = true;
function toggleTheme() {
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? '' : 'light');
  document.getElementById('theme-btn').textContent = darkMode ? '🌙' : '☀️';
}

// ============ TOAST ============
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 2800);
}

// ============ MODAL ============
let modalClose = null;
function openModal(title, bodyHtml, footerHtml) {
  let m = document.getElementById('global-modal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'global-modal';
    m.className = 'modal-overlay';
    m.innerHTML = `<div class="modal"><div class="modal-header"><span class="modal-title" id="modal-title-text"></span><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"></div></div>`;
    document.body.appendChild(m);
    m.addEventListener('click', e => { if (e.target === m) closeModal(); });
  }
  document.getElementById('modal-title-text').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-footer').innerHTML = footerHtml;
  m.classList.add('open');
}
function closeModal() {
  const m = document.getElementById('global-modal');
  if (m) m.classList.remove('open');
}

// ============ HELPERS ============
function fmt(n) { return Number(n||0).toLocaleString('ar-IQ'); }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('ar-IQ'); }
function totalReceipts(complexId) { return DB.receipts.filter(r => r.complex_id == complexId).reduce((s,r) => s + Number(r.amount), 0); }
function totalPayments(complexId) { return DB.payments.filter(p => p.complex_id == complexId).reduce((s,p) => s + Number(p.amount), 0); }
function contractorTotal(c) { return c.type==='meter' ? c.price_per_meter * c.agreed_qty : c.houses * c.house_price; }
function contractorPaid(cid) { return DB.payments.filter(p => p.beneficiary_id == cid && p.type==='مقاول').reduce((s,p) => s+Number(p.amount),0); }
function statusBadge(s) {
  const map = {'جاري':'badge-blue','منجز':'badge-green','متوقف':'badge-orange','ملغي':'badge-red'};
  return `<span class="badge ${map[s]||'badge-blue'}">${s}</span>`;
}

// ============ GLOBAL SEARCH ============
function globalSearch(q) {
  if (!q || q.length < 2) return;
  q = q.toLowerCase();
  const results = [];
  DB.complexes.forEach(c => { if (c.name.includes(q)||c.contract_no.toLowerCase().includes(q)||c.company.includes(q)) results.push({type:'مجمع',name:c.name,page:'complexes'}); });
  DB.contractors.forEach(c => { if (c.name.includes(q)||c.phone.includes(q)) results.push({type:'مقاول',name:c.name,page:'contractors'}); });
  DB.employees.forEach(e => { if (e.name.includes(q)||e.phone.includes(q)) results.push({type:'موظف',name:e.name,page:'employees'}); });
  DB.receipts.forEach(r => { if (r.no.toLowerCase().includes(q)||r.from.includes(q)) results.push({type:'سند قبض',name:r.no,page:'receipts'}); });
  DB.payments.forEach(p => { if (p.no.toLowerCase().includes(q)||p.beneficiary.includes(q)) results.push({type:'سند صرف',name:p.no,page:'payments'}); });
  if (results.length > 0) {
    const html = results.slice(0,8).map(r => `<div style="padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="navigate('${r.page}');closeModal()"><span class="badge badge-blue" style="margin-left:8px">${r.type}</span>${r.name}</div>`).join('');
    openModal('نتائج البحث', html, '<button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>');
  }
}

  if (!ben||!amount) { showToast('يرجى ملء الحقول المطلوبة','error'); return; }
  const obj={beneficiary:ben,date:document.getElementById('pf-date').value,type:document.getElementById('pf-type').value,complex_id:+document.getElementById('pf-complex').value||null,amount,method:document.getElementById('pf-method').value,notes:document.getElementById('pf-notes').value,updated_at:now()};
  if (id) { const i=DB.payments.findIndex(x=>x.id==id); DB.payments[i]={...DB.payments[i],...obj}; }
  else { obj.id=Date.now(); obj.no=nextPaymentNo(); obj.created_at=now(); DB.payments.push(obj); }
  saveDB(); closeModal(); renderPage('payments'); showToast('تم حفظ السند');
}
function deletePayment(id) {
  if (!confirm('حذف السند؟')) return;
  DB.payments=DB.payments.filter(x=>x.id!=id);
  saveDB(); closeModal(); renderPage('payments'); showToast('تم الحذف','error');
}

  },0);
  document.getElementById('report-content').innerHTML = `
    <div class="stat-card mb-16"><div class="stat-label">إجمالي الرواتب هذا الشهر</div><div class="stat-value text-accent">${fmt(totalSal)} د.ع</div></div>

function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `contracting_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  showToast('تم تصدير البيانات');
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        DB = JSON.parse(ev.target.result);
        saveDB();
        renderPage(currentPage);
        showToast('تم استيراد البيانات بنجاح');
      } catch { showToast('خطأ في الملف','error'); }
    };
    reader.readAsText(file);
  };
  input.click();
}
function resetSystem() {
  if (!confirm('هل أنت متأكد؟ سيتم حذف جميع البيانات نهائياً!')) return;
  if (!confirm('تأكيد أخير: سيتم مسح كل شيء!')) return;
  localStorage.removeItem('contracting_db');
  location.reload();
}
